runConfig:
  runtime: nodejs20
  timeoutSeconds: 300
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXTAUTH_URL
    secret: NEXTAUTH_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: REDIS_URL
    secret: REDIS_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: KAM_PASSWORD
    secret: KAM_PASSWORD
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_PROJECT
    value: rappi-social-launch
    availability:
      - BUILD
      - RUNTIME
